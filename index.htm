<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>

<style>
	body {
    	background-color: Cyan;
    }
    h1{
    	font-size: 20px;
        color: red;
        background-color: yellow;
    }
    
    .my-box{
    	background-color: #f0f0f0;
        width: 200px;
        border: 2px solid blue;
        padding: 20px;
        margin:10px;
        border-radius:10px;
        text-align: center;
    }
    
    
</style>

</head>
<body>

<h1>This is a Heading</h1>
<p>This is a paragraph.</p>


<div class="my-box">
	<h1>This is a container</h1>
	<p>This is a paragraph in container.</p>

</div>

<div class="my-box">
	<h1>This is a second container</h1>
	<p>This is a paragraph in container.</p>

</div>

</body>
</html>
